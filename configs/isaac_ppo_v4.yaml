baseline_name: isaac_v4_morphology_reward_humanoid_direct
simulator_backend: Isaac Lab
reward_version: isaac_v4_morphology_reward
loss_version: isaac_rsl_rl_ppo_default
reward_design_goal: Add explicit morphology and gait-quality penalties to prevent the low spider/crawling reward exploit observed in V2/V3.
custom_isaac_task: true
isaaclab_dir: /workspace/IsaacLab
task: Isaac-Humanoid-V4-Direct-v0
seed: 301
num_envs: 4096
total_timesteps: 200000000
num_steps_per_env: 32
max_iterations:
save_interval: 50
experiment_name: humanoid_direct_single_ppo_v4
run_name: morphology_reward_v4
output_dir: outputs/isaac_ppo_v4
device: cuda:0
headless: true
video: false
video_length: 200
video_interval: 2000
heading_weight: 1.0
up_weight: 1.0
energy_cost_scale: 0.08
actions_cost_scale: 0.02
alive_reward_scale: 0.8
dof_vel_scale: 0.1
death_cost: -6.0
termination_height: 1.05
angular_velocity_scale: 0.25
contact_force_scale: 0.01
height_target: 1.35
height_bonus_scale: 4.0
low_height_threshold: 1.15
low_height_penalty_scale: 6.0
torso_low_height: 1.10
torso_low_penalty_scale: 4.0
arm_low_height: 0.65
arm_low_penalty_scale: 4.0
leg_pose_penalty_scale: 0.6
arm_pose_penalty_scale: 0.8
action_rate_penalty_scale: 0.04
reward_notes:
  - V4 installs a custom Isaac Lab direct humanoid task instead of changing only built-in reward coefficients.
  - The custom reward adds root-height, torso-height, arm-height, leg-posture, arm-posture, and action-rate terms.
  - Arm/hand low-height penalties are a proxy for discouraging arm-supported crawling.
  - V4 may score lower than V2/V3; qualitative gait quality is the main criterion.
hydra_overrides: []
