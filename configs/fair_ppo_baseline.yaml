env_id: Humanoid-v5
seed: 1
total_timesteps: 1000000
num_envs: 8
num_steps: 1024
learning_rate: 0.0003
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
minibatch_size:
num_minibatches: 16
update_epochs: 10
norm_adv: true
clip_coef: 0.2
clip_vloss: true
ent_coef: 0.0
vf_coef: 0.5
