baseline_name: isaac_v3_tall_upright_humanoid_direct
simulator_backend: Isaac Lab
reward_version: isaac_v3_tall_upright
loss_version: isaac_rsl_rl_ppo_default
reward_design_goal: Discourage the low crawling gait found by V2 by requiring a taller torso and stronger upright alignment.
isaaclab_dir: /workspace/IsaacLab
task: Isaac-Humanoid-Direct-v0
seed: 301
num_envs: 4096
total_timesteps: 200000000
num_steps_per_env: 32
max_iterations:
save_interval: 50
experiment_name: humanoid_direct_single_ppo_v3
run_name: tall_upright_v3
output_dir: outputs/isaac_ppo_v3
device: cuda:0
headless: true
video: false
video_length: 200
video_interval: 2000
heading_weight: 1.0
up_weight: 0.75
energy_cost_scale: 0.08
actions_cost_scale: 0.02
alive_reward_scale: 1.2
dof_vel_scale: 0.1
death_cost: -4.0
termination_height: 1.0
angular_velocity_scale: 0.25
contact_force_scale: 0.01
reward_notes:
  - V3 keeps Isaac Lab physics unchanged and changes reward coefficients only.
  - V3 is stricter than V2 because V2 learned long survival with a low crawling gait.
  - The higher termination height makes crawling and collapsed locomotion fail earlier.
  - Stronger upright and heading rewards push toward tall forward-facing locomotion.
  - Lower alive reward than V0 reduces the incentive to survive without good posture.
hydra_overrides: []
