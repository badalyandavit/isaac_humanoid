reward_notes:
  - V11 targets the V10 failure mode where one foot floated high while the other foot carried most contact.
  - It adds explicit penalties for excessive swing-foot height and excessive left/right foot-height difference.
  - It sharply reduces single-foot and soft single-support rewards so one-legged shuffling is less attractive.
  - It keeps V10's stronger lateral-drift control but relaxes gait rewards that encouraged high-knee motion.
  - It increases arm-high and arm-pose penalties because V10 paired the floating-foot exploit with a raised-arm pose.
