reward_notes:
  - V14 keeps V13's anti-floating safeguards but relaxes the air-time and foot-height limits enough to permit real swing steps.
  - It adds a soft foot-dominance switch reward so left/right support changes are rewarded even when contact proxies are not perfectly binary.
  - It penalizes overlong same-foot dominance, directly targeting V13's grounded shuffle and left-contact bias.
  - It rewards contact from the historically underused foot so long-horizon left/right balance becomes an active gait objective.
  - It increases arm-pose, arm-action, and arm-height pressure slightly so the policy has less incentive to use raised arms as the main stabilizer.
