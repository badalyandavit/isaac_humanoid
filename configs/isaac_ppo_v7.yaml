reward_notes:
  - V7 is the first contact/gait-structured Isaac variant rather than another generic anti-crawl penalty sweep.
  - It adds a target forward-speed reward, lateral drift penalty, and extra vertical-bounce penalty when forward speed is low.
  - It penalizes arms held overhead, which V6 used as a balance exploit.
  - It uses Isaac body contact forces if available, otherwise foot-height proxies, to shape single-foot support, foot switching, no-contact, double-contact, and left/right contact balance.
  - Contact terms are still reward shaping, not a hard-coded controller.
