reward_notes:
  - V15 starts from V14 because V14 reached full episode length with much better left/right foot balance than V13.
  - It lowers the arm-neutral and arm-high thresholds while raising arm pose/action/velocity penalties, targeting the raised-hands visual failure.
  - It increases underused-foot, soft-switch, and stance-duration pressure so left/right dominance should alternate more often.
  - It relaxes the air-time and foot-height clamps relative to V13/V14 so a real swing step is possible instead of only a planted shuffle.
  - It keeps contact-balance and no-contact penalties active to avoid the V12 one-foot airborne glide.
