reward_notes:
  - V8 targets the V7 failure mode where forward motion improved but foot switching stayed near zero and foot slip remained high.
  - It adds soft contact-transition reward so alternating support can be learned even when contact proxies are not perfectly binary.
  - It rewards swing-foot clearance and modest fore-aft step length while penalizing wide lateral foot spread.
  - It adds forward-speed tracking and high-speed penalties because V7 overshot the target speed.
  - It strengthens foot-slip and left/right contact-balance penalties.
