reward_notes:
  - V13 fixes the V12 one-foot airborne glide where touchdown reward stayed at zero and one foot remained airborne.
  - It adds a maximum foot-air-time penalty so a foot cannot stay off the ground for most of the episode.
  - It strengthens the sustained contact-balance penalty and tightens the allowed left/right foot-height difference.
  - It reduces stance-foot slip pressure versus V12 so the agent is not rewarded indirectly for keeping one foot airborne.
  - It keeps a small touchdown reward, but treats it as secondary to contact balance and bounded air time.
