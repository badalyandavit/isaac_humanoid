env_id: Humanoid-v5
seed: 1
total_timesteps: 1000000
num_envs: 8
num_steps: 1024
learning_rate: 0.0003
anneal_lr: true
gamma: 0.99
gae_lambda: 0.95
num_minibatches: 16
update_epochs: 10
clip_coef: 0.2
ent_coef: 0.0
vf_coef: 0.5
max_grad_norm: 0.5
target_kl: 0.03
hidden_sizes: [256, 256]
activation: tanh
obs_norm: true
reward_scale: 1.0
device: cuda
torch_compile: false
amp: false
async_envs: false
log_interval_updates: 1
eval_interval_updates: 10
eval_episodes: 5
save_interval_updates: 25
output_dir: outputs/baseline_humanoid_v5
