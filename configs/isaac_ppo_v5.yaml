baseline_name: isaac_v5_anti_jump_morphology_humanoid_direct
simulator_backend: Isaac Lab
reward_version: isaac_v5_anti_jump_morphology
loss_version: isaac_rsl_rl_ppo_default
reward_design_goal: Keep V4's anti-crawl morphology reward while removing the jump/hop exploit caused by positive height reward.
custom_isaac_task: true
isaaclab_dir: /workspace/IsaacLab
task: Isaac-Humanoid-V5-Direct-v0
seed: 301
num_envs: 4096
total_timesteps: 200000000
num_steps_per_env: 32
max_iterations:
save_interval: 50
experiment_name: humanoid_direct_single_ppo_v5
run_name: anti_jump_morphology_v5
output_dir: outputs/isaac_ppo_v5
device: cuda:0
headless: true
video: false
video_length: 200
video_interval: 2000
heading_weight: 1.0
up_weight: 0.8
energy_cost_scale: 0.10
actions_cost_scale: 0.03
alive_reward_scale: 1.0
dof_vel_scale: 0.1
death_cost: -4.0
termination_height: 0.95
angular_velocity_scale: 0.25
contact_force_scale: 0.01
height_target: 1.25
height_bonus_scale: 0.0
height_tracking_penalty_scale: 2.0
low_height_threshold: 1.05
low_height_penalty_scale: 3.0
high_height_threshold: 1.45
high_height_penalty_scale: 4.0
torso_low_height: 1.00
torso_low_penalty_scale: 2.0
arm_low_height: 0.65
arm_low_penalty_scale: 4.0
leg_pose_penalty_scale: 0.4
arm_pose_penalty_scale: 0.8
action_rate_penalty_scale: 0.08
vertical_velocity_penalty_scale: 2.0
reward_notes:
  - V5 uses the same custom Isaac Lab task implementation as V4 but changes coefficients.
  - V5 removes the positive height bonus that made V4 jump.
  - V5 uses low-height, high-height, and vertical-velocity penalties as posture constraints instead.
  - V5 keeps arm-low and arm-pose penalties to discourage spider/crawling locomotion.
hydra_overrides: []
