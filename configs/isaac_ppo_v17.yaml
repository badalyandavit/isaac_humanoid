reward_notes:
  - V17 is the final conservative tune and restores V14's taller root-height target and full-episode stability pressure.
  - It keeps V16-style arm-down pressure but backs off the excessive arm-pose pressure that coincided with lower torso height.
  - It directly targets V16's high no-foot-contact and airtime diagnostics with stronger no-contact, airtime, and high-swing penalties.
  - It keeps one-foot rewards small so the policy cannot win by gliding on long single-support phases.
  - It slightly strengthens cadence and underused-foot terms to reduce left/right contact bias without repeating the V15 collapse.
