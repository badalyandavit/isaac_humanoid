reward_notes:
  - V10 targets the V9 failure mode of stable forward motion with strong left/right contact imbalance and lateral drift.
  - It keeps V9's permissive survival envelope, because V8 showed that hard step constraints can collapse episode length.
  - It strengthens lateral-velocity and long-term foot-contact balance penalties.
  - It reduces the soft single-support, step-length, and foot-height-difference rewards so one-legged shuffling is less attractive.
  - It uses a slightly longer gait curriculum so balance/contact pressure ramps in after upright locomotion is established.
