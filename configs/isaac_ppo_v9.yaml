reward_notes:
  - V9 addresses the V8 regression where hard step-transition shaping collapsed episode length and exploration.
  - It restores a slightly more permissive survival envelope from V7 while keeping V8's forward-speed cap and slip control.
  - Gait/contact shaping ramps from 25% strength to full strength over early training so the policy first learns upright motion.
  - It adds soft single-support and mild foot-height-difference rewards that do not require perfectly binary contact proxies.
  - Step-length, swing-clearance, contact-balance, and no-contact/double-contact terms are deliberately weaker than V8.
