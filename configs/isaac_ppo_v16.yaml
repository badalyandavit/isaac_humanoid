reward_notes:
  - V16 is based on V14 rather than V15 because V15 collapsed to short episodes and one-sided support.
  - It applies moderate arm-down pressure: stronger than V14, much weaker than V15.
  - It nudges cadence balance above V14 but avoids V15's high stance-duration and underused-foot pressure.
  - It restores V14-like foot-air-time control to avoid V15's long-airtime and low-height failure mode.
  - It keeps V14's full-episode stability as the primary target, then optimizes arm posture and alternation.
