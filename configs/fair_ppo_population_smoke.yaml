env_id: Humanoid-v5
seed: 101
num_train_agents: 2
num_average_agents: 2
total_timesteps: 16384
budget_mode: aggregate
eval_episodes: 1
aggregator: mean
output_dir: outputs/smoke_fair_ppo_population
device: cpu
agent:
  num_envs: 2
  num_steps: 128
  learning_rate: 0.0003
  anneal_lr: true
  gamma: 0.99
  gae_lambda: 0.95
  minibatch_size:
  num_minibatches: 2
  update_epochs: 1
  norm_adv: true
  clip_coef: 0.2
  clip_vloss: true
  ent_coef: 0.0
  vf_coef: 0.5
  max_grad_norm: 0.5
  target_kl: 0.03
  hidden_sizes: [64, 64]
  activation: tanh
  obs_norm: true
  reward_scale: 1.0
  torch_compile: false
  amp: false
  async_envs: false
  log_interval_updates: 1
  eval_episodes: 1
  save_interval_updates: 100
