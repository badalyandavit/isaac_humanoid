seed: 42

# Skrl SAC config for Isaac-Humanoid-Direct-Multi-v0 (same env as Isaac-Humanoid-Direct-v0).
# Off-policy methods don't benefit from thousands of parallel envs the way PPO does;
# we keep num_envs moderate (caller can override on the CLI) and rely on a large
# replay buffer plus aggressive gradient steps per env step.

models:
  separate: True
  policy:
    class: GaussianMixin
    clip_actions: True
    clip_log_std: True
    min_log_std: -5.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
      - name: net
        input: STATES
        layers: [512, 256, 128]
        activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([STATES, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([STATES, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([STATES, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: False
    network:
      - name: net
        input: concatenate([STATES, ACTIONS])
        layers: [512, 256, 128]
        activations: elu
    output: ONE

memory:
  class: RandomMemory
  memory_size: 1000000

agent:
  class: SAC
  gradient_steps: 1
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 5.0e-04
  critic_learning_rate: 5.0e-04
  random_timesteps: 80
  learning_starts: 80
  grad_norm_clip: 0
  learn_entropy: True
  entropy_learning_rate: 5.0e-04
  initial_entropy_value: 1.0
  rewards_shaper_scale: 0.01

  experiment:
    directory: "humanoid_direct_skrl_sac"
    experiment_name: ""
    write_interval: 240
    checkpoint_interval: 4800

trainer:
  class: SequentialTrainer
  timesteps: 24000
  environment_info: log
