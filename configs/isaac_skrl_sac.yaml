seed: 42
models:
  separate: true
  policy:
    class: GaussianMixin
    clip_actions: true
    clip_log_std: true
    min_log_std: -5.0
    max_log_std: 2.0
    initial_log_std: 0.0
    network:
    - name: net
      input: OBSERVATIONS
      layers:
      - 512
      - 256
      - 128
      activations: elu
    output: ACTIONS
  critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 512
      - 256
      - 128
      activations: elu
    output: ONE
  critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 512
      - 256
      - 128
      activations: elu
    output: ONE
  target_critic_1:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 512
      - 256
      - 128
      activations: elu
    output: ONE
  target_critic_2:
    class: DeterministicMixin
    clip_actions: false
    network:
    - name: net
      input: concatenate([OBSERVATIONS, ACTIONS])
      layers:
      - 512
      - 256
      - 128
      activations: elu
    output: ONE
memory:
  class: RandomMemory
  memory_size: 1000000
agent:
  class: SAC
  gradient_steps: 1
  batch_size: 4096
  discount_factor: 0.99
  polyak: 0.005
  actor_learning_rate: 0.0005
  critic_learning_rate: 0.0005
  random_timesteps: 80
  learning_starts: 80
  grad_norm_clip: 0
  learn_entropy: true
  entropy_learning_rate: 0.0005
  initial_entropy_value: 1.0
  rewards_shaper_scale: 0.01
  experiment:
    directory: humanoid_direct_skrl_sac
    experiment_name: ''
    write_interval: 240
    checkpoint_interval: 4800
  rollouts: 1
trainer:
  class: SequentialTrainer
  timesteps: 24000
  environment_info: log
