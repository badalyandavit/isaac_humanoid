reward_notes:
  - V12 keeps V11's grounded-foot safeguards and adds a contact-aware stance-foot slip penalty.
  - It rewards foot touchdown only after a short air-time window while the opposite foot was stance, so hopping is not rewarded.
  - It lowers the effective arm-height threshold through an arm-neutral-height penalty to discourage arms-up balancing.
  - It slightly reduces the target forward speed and raises slip/double-contact pressure so sliding forward is less attractive.
  - It keeps the high-foot and foot-height-difference penalties from V11 to avoid returning to the V10 floating-foot exploit.
