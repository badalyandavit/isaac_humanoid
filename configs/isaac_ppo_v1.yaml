baseline_name: isaac_v1_upright_controlled_humanoid_direct
simulator_backend: Isaac Lab
reward_version: isaac_v1_upright_controlled
loss_version: isaac_rsl_rl_ppo_default
reward_design_goal: Encourage a more upright, forward-facing, controlled gait than Isaac V0 while keeping the same Isaac simulator and task.
isaaclab_dir: /workspace/IsaacLab
task: Isaac-Humanoid-Direct-v0
seed: 301
num_envs: 4096
total_timesteps: 15000000
num_steps_per_env: 32
max_iterations:
save_interval: 10
experiment_name: humanoid_direct_single_ppo_v1
run_name: upright_controlled_v1
output_dir: outputs/isaac_ppo_v1
device: cuda:0
headless: true
video: false
video_length: 200
video_interval: 2000
heading_weight: 1.0
up_weight: 0.5
energy_cost_scale: 0.08
actions_cost_scale: 0.02
alive_reward_scale: 1.0
dof_vel_scale: 0.1
death_cost: -5.0
termination_height: 0.95
angular_velocity_scale: 0.25
contact_force_scale: 0.01
reward_notes:
  - V1 keeps Isaac Lab physics unchanged and changes reward coefficients only.
  - Stronger heading and upright rewards discourage hunched or sideways progress.
  - Lower alive reward makes survival without useful posture less dominant.
  - Higher action and energy penalties discourage thrashy control.
  - Higher termination height and stronger death cost punish collapsed locomotion earlier.
hydra_overrides: []
