reward_notes:
  - V18 is the final polish pass on V17, not a broad redesign.
  - It keeps V17's full-horizon stability and contact/no-contact safeguards.
  - It increases arm-high, arm-neutral-height, arm-action, and arm-velocity pressure to reduce the remaining forward/up arm posture.
  - It increases foot-slip and stance-foot-slip penalties because V17 still looked like a stiff shuffle with dragging feet.
  - It adds a small swing-clearance, touchdown, and switch incentive so the policy has a reason to lift and replace each foot without becoming airborne.
  - It mildly raises low-height and torso-height pressure to avoid returning to the low V16 posture.
